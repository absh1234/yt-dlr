name: 🎬 YouTube Downloader to Bale (Ultimate Version)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Quality (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'Target Chat ID'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
      # yt-dlp looks for solver scripts in PATH or in any CHALLENGE_SOLVER_DIR
      CHALLENGE_SOLVER_DIR: ${{ github.workspace }}/.scripts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Node.js (required by the challenge solver) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---- Download the challenge solver script (no git clone needed) ----
      - name: Install yt-dlp challenge solver
        run: |
          mkdir -p .scripts
          curl -L -o .scripts/n.js https://raw.githubusercontent.com/yt-dlp/yt-dlp-challenge-solver/main/n.js
          chmod +x .scripts/n.js

      # ---- Cache static FFmpeg ----
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tools/ffmpeg
          key: ${{ runner.os }}-ffmpeg-static-v1

      - name: Setup ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/ffmpeg
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar xJ -C ~/tools/ffmpeg --strip-components=1
          chmod +x ~/tools/ffmpeg/ffmpeg ~/tools/ffmpeg/ffprobe

      - name: Add ffmpeg to PATH
        run: echo "$HOME/tools/ffmpeg" >> $GITHUB_PATH

      # ---- Cache yt-dlp ----
      - name: Cache yt-dlp
        id: cache-yt-dlp
        uses: actions/cache@v4
        with:
          path: ~/tools/yt-dlp
          key: ${{ runner.os }}-yt-dlp-v1

      - name: Setup yt-dlp
        if: steps.cache-yt-dlp.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/yt-dlp
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp/yt-dlp
          chmod +x ~/tools/yt-dlp/yt-dlp

      - name: Add yt-dlp to PATH
        run: echo "$HOME/tools/yt-dlp" >> $GITHUB_PATH

      # ---- Download the media ----
      - name: Download media from YouTube
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > youtube_cookies.txt

          YT_FLAGS=(
            --cookies youtube_cookies.txt
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            --extractor-args "youtube:player_client=web"
            -o "media.%(ext)s"
            "${{ inputs.url }}"
          )

          case "${{ inputs.quality }}" in
            best)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              FILE="media.mp4"
              ;;
            720p)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              FILE="media.mp4"
              ;;
            audio)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestaudio" --extract-audio --audio-format mp3
              FILE="media.mp3"
              ;;
          esac

          if [ ! -f "$FILE" ]; then
            echo "Download failed: $FILE not found"
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "SIZE=$(stat -c%s "$FILE")" >> $GITHUB_ENV

      # ---- Split & send if necessary ----
      - name: Split and send media parts
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="${{ env.FILE }}"
          SIZE="${{ env.SIZE }}"
          QUALITY="${{ inputs.quality }}"
          MAX_SIZE=9500000

          if [ "$SIZE" -le "$MAX_SIZE" ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" -F "audio=@${FILE}" -F "caption=🎵 Audio File"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" -F "video=@${FILE}" -F "caption=🎬 Video File"
            fi
          else
            DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$FILE")
            # Calculate segment time proportionally, reduced by 15% for safety
            SEG_TIME=$(python3 -c "print(round(($DURATION * ($MAX_SIZE / $SIZE)) * 0.85, 2))")
            EXT="${FILE##*.}"

            mkdir -p parts
            # Split with no re-encoding (-c copy)
            ffmpeg -v quiet -i "$FILE" -f segment -segment_time "$SEG_TIME" -c copy -reset_timestamps 1 "parts/part_%03d.${EXT}"

            TOTAL=$(ls parts/part_* | wc -l)
            COUNT=1
            for PART in parts/part_*; do
              SUCCESS=0
              for ATTEMPT in 1 2 3; do
                if [ "$QUALITY" = "audio" ]; then
                  RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" -F "audio=@${PART}" -F "caption=🎵 Part $COUNT/$TOTAL")
                else
                  RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" -F "video=@${PART}" -F "caption=🎬 Part $COUNT/$TOTAL")
                fi
                if echo "$RESP" | grep -q '"ok":true'; then
                  SUCCESS=1
                  break
                fi
                sleep 2
              done

              if [ $SUCCESS -eq 0 ]; then
                curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ Failed to send part $COUNT"
              fi
              COUNT=$((COUNT + 1))
            done
          fi

      # ---- Report final status ----
      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ Operation Completed Successfully."
          else
            curl -s "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ Operation Failed."
          fi
