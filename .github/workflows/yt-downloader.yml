name: 🎬 YouTube to Guardnet

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      quality:
        required: true
        default: 'best'
      chat_id:
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-v5

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Setup Xray (if needed)
        if: steps.cache.outputs.cache-hit != 'true' && secrets.XRAY_CONFIG != ''
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      - name: Add to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      - name: Run proxy if configured
        if: secrets.XRAY_CONFIG != ''
        run: |
          echo '${{ secrets.XRAY_CONFIG }}' > config.json
          ~/tools/xray/xray run -config config.json &
          sleep 2

      - name: Download video/audio
        run: |
          PROXY=""
          [ -n "${{ secrets.XRAY_CONFIG }}" ] && PROXY="--proxy socks5://127.0.0.1:10808"
          case "${{ inputs.quality }}" in
            best) yt-dlp $PROXY -f "bestvideo+bestaudio/best" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            720p) yt-dlp $PROXY -f "bestvideo[height<=720]+bestaudio/best[height<=720]" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            audio) yt-dlp $PROXY -f "bestaudio" --extract-audio --audio-format mp3 -o "media.%(ext)s" "${{ inputs.url }}" ;;
          esac
          FILE=$(ls media.* 2>/dev/null | head -n 1)
          if [ -z "$FILE" ]; then echo "دانلود نشد"; exit 1; fi
          echo "FILE=$FILE" >> $GITHUB_ENV

      - name: Upload to Guardnet
        run: |
          RESP=$(curl -s -X POST "https://guardnet.ir/api/files/upload" \
            -H "Authorization: Bearer ${{ secrets.GUARDNET_API_KEY }}" \
            -F "file=@${FILE}")
          URL=$(echo "$RESP" | grep -o '"url":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$URL" ]; then echo "Upload failed: $RESP"; exit 1; fi
          curl -s "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage?chat_id=${{ inputs.chat_id }}&text=$(echo "🎬 دانلود شد\n📥 $URL" | jq -sRr @uri)"
