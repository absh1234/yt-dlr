name: 🎬 YT → Bale (Proxy + Multi‑VPN Test)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Quality (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'Target Chat ID'
        required: true
      vpn_configs:
        description: 'VLESS/VMess/Trojan/SS links or Xray JSON (one per line)'
        required: true
        default: ''

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Cache tools ----------
      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/yt-dlp
            ~/tools/xray
          key: tools-${{ runner.os }}-v4

      - name: Download yt‑dlp (if not cached)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Download Xray core (if not cached)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/xray
          curl -fsSL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray
          rm xray.zip

      - name: Add tools to PATH
        run: |
          echo "$HOME/tools" >> $GITHUB_PATH
          echo "$HOME/tools/xray" >> $GITHUB_PATH

      # ---------- Cache static FFmpeg ----------
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tools/ffmpeg
          key: ${{ runner.os }}-ffmpeg-static-v4

      - name: Setup ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/ffmpeg
          curl -fsSL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar xJ -C ~/tools/ffmpeg --strip-components=1
          chmod +x ~/tools/ffmpeg/ffmpeg ~/tools/ffmpeg/ffprobe

      - name: Add ffmpeg to PATH
        run: echo "$HOME/tools/ffmpeg" >> $GITHUB_PATH

      # ---------- VPN config parser & tester ----------
      - name: Set up Python & test configs (robust)
        run: |
          echo "${{ inputs.vpn_configs }}" > configs_raw.txt

          python3 << 'PYEOF'
          import base64, json, os, subprocess, sys, time, urllib.request

          def parse_share_link(link):
              # (your existing parsing logic – keep it unchanged)
              ...

          with open('configs_raw.txt', 'r') as f:
              lines = [line.strip() for line in f if line.strip()]

          outbounds = []
          for line in lines:
              ob = parse_share_link(line)
              if ob:
                  outbounds.append(ob)

          if not outbounds:
              print("No valid configs!")
              sys.exit(1)

          results = []
          for i, outbound in enumerate(outbounds):
              tag = outbound.get('tag', f'proxy-{i}')
              print(f"Testing {tag}...", end=' ')
              xray_conf = {
                  "inbounds": [{"port": 10808, "protocol": "socks", "settings": {"auth": "noauth"}}],
                  "outbounds": [outbound]
              }
              test_path = f'test_config_{i}.json'
              with open(test_path, 'w') as f:
                  json.dump(xray_conf, f)
              proc = subprocess.Popen(['xray', 'run', '-config', test_path],
                                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              time.sleep(2)
              try:
                  start = time.time()
                  req = urllib.request.Request('https://www.youtube.com/favicon.ico',
                                               headers={'User-Agent': 'curl/7.68.0'})
                  proxy_handler = urllib.request.ProxyHandler({'https': 'socks5://127.0.0.1:10808'})
                  opener = urllib.request.build_opener(proxy_handler)
                  opener.open(req, timeout=10)
                  latency = time.time() - start
                  results.append((latency, outbound, tag))
                  print(f"OK ({latency:.2f}s)")
              except Exception as e:
                  print(f"FAILED ({e})")
              finally:
                  proc.terminate()
                  try:
                      proc.wait(timeout=5)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                  time.sleep(1)
                  os.remove(test_path)

          if not results:
              print("All proxies failed.")
              sys.exit(1)

          results.sort()
          best_latency, best_outbound, best_tag = results[0]
          print(f"Selected proxy: {best_tag} (latency {best_latency:.2f}s)")

          final_conf = {
              "inbounds": [{"port": 10808, "protocol": "socks", "settings": {"auth": "noauth"}}],
              "outbounds": [best_outbound, {"protocol": "freedom", "tag": "direct"}],
              "routing": {"rules": [{"type": "field", "outboundTag": "direct", "domain": ["geosite:cn", "geosite:private"]}]}
          }
          final_path = os.path.join(os.environ['GITHUB_WORKSPACE'], 'final_config.json')
          with open(final_path, 'w') as f:
              json.dump(final_conf, f, indent=2)
          print(f"Config saved to {final_path}")
          PYEOF

          # Verify the file is there
          if [ ! -s final_config.json ]; then
            echo "❌ final_config.json was not created!"
            exit 1
          fi
          ls -l final_config.json
      - name: Start Xray proxy
        run: |
          xray run -config final_config.json > /tmp/xray.log 2>&1 &
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 10808; then
              echo "Proxy is listening."
              break
            fi
            sleep 1
          done
          if ! nc -z 127.0.0.1 10808; then
            echo "ERROR: Proxy did not start. Log:"
            cat /tmp/xray.log
            exit 1
          fi
          curl -s --socks5 127.0.0.1:10808 https://www.youtube.com/favicon.ico -o /dev/null -w '%{http_code}' && echo "✅ Proxy works"

    #---------------download---------
      - name: Download media from YouTube
        run: |
          # No cookies – rely on the proxy + mobile clients to avoid challenges
          YT_FLAGS=(
            --proxy socks5://127.0.0.1:10808
            --user-agent "com.google.ios.youtube/19.45.2 (iPhone; CPU iPhone OS 16_0 like Mac OS X)"
            --extractor-args "youtube:player_client=ios,android,tv"
            --extractor-retries 5
            --retries 5
            -o "media.%(ext)s"
            "${{ inputs.url }}"
          )

          case "${{ inputs.quality }}" in
            best)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              FILE="media.mp4"
              ;;
            720p)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              FILE="media.mp4"
              ;;
            audio)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestaudio" --extract-audio --audio-format mp3
              FILE="media.mp3"
              ;;
          esac

          if [ ! -f "$FILE" ]; then
            echo "❌ Download failed"
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "SIZE=$(stat -c%s "$FILE")" >> $GITHUB_ENV
      # ---------- Split & send ----------
      # ... (keep your existing splitting and sending steps unchanged) ...
