name: 🎬 YouTube Downloader to Bale (Enhanced Proxy)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl jq python3

      - name: Extract video ID and get streams
        id: streams
        run: |
          # استخراج دقیق Video ID
          VIDEO_ID=$(echo "${{ inputs.url }}" | sed -n 's/.[?&]v=\([^&]*\).*/\1/p; s/.*youtu.be\/\([^?]*\).*/\1/p; s/.*youtube.com\/embed\/\([^?]*\).*/\1/p' | tail -1)
          if [ -z "$VIDEO_ID" ]; then echo "Invalid URL"; exit 1; fi
          echo "Video ID: $VIDEO_ID"

          # لیست اینستنس‌های جایگزین
          INSTANCES=("pipedapi.kavin.rocks" "pipedapi.canary.yt" "pipedapi.privacy.dev" "pipedapi.dev")

          SUCCESS=false
          for INSTANCE in "${INSTANCES[@]}"; do
            echo "Trying instance: $INSTANCE"
            API="https://$INSTANCE/streams/${VIDEO_ID}"

            # دریافت پاسخ و ذخیره در یک متغیر موقت
            RESPONSE=$(curl -s --connect-timeout 10 "$API")

            # بررسی اینکه آیا پاسخ خالی است یا با کاراکتر { شروع می‌شود (نشانه JSON بودن)
            if [[ "$RESPONSE" == \{* ]]; then
              # حالا با خیال راحت از jq استفاده می‌کنیم
              STREAM_COUNT=$(echo "$RESPONSE" | jq '.videoStreams | length' 2>/dev/null || echo 0)

              if [ "$STREAM_COUNT" -gt 0 ]; then
                echo "Successfully connected to $INSTANCE"
                echo "STREAMS=$RESPONSE" >> $GITHUB_ENV
                SUCCESS=true
                break
              fi
            fi
            echo "Instance $INSTANCE returned invalid JSON or no streams, trying next..."
          done

          if [ "$SUCCESS" = false ]; then
            echo "Error: All Piped instances failed or returned invalid data."
            exit 1
          fi

      - name: Download and (if needed) merge
        run: |
          if [ "$MODE" = "single" ]; then
            curl -L "$STREAM_URL" -o "media.$EXT"
          else
            curl -L "$VID_URL" -o video.mp4
            curl -L "$AUD_URL" -o audio.m4a
            ffmpeg -i video.mp4 -i audio.m4a -c copy -map 0:v -map 1:a "media.mp4"
          fi

          FILE=$(ls media.* 2>/dev/null | head -n1)
          [ -z "$FILE" ] && echo "Download failed" && exit 1
          echo "FILE=$FILE" >> $GITHUB_ENV
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      - name: Split and send to Bale
        run: |
          TOKEN="$BALE_TOKEN"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="$FILE"
          SIZE="$SIZE"
          QUALITY="${{ inputs.quality }}"

          # محدودیت فایل در بله حدود ۱۰ مگابایت است (بسته به نوع اکانت)
          # ما روی ۱۰ مگابایت تنظیم می‌کنیم
          if [ "$SIZE" -le 10485760 ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" -F "caption=🎵 فایل صوتی"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" -F "caption=🎬 ویدیوی شما (${QUALITY})"
            fi
            exit 0
          fi

          # عملیات تکه تکه کردن فایل‌های بزرگ
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          # محاسبه بیت‌ریت برای تقسیم‌بندی هوشمند بر اساس زمان
          BITRATE=$(python3 -c "print(int(${SIZE}  8 / float(${DURATION})))")
          # هدف: هر پارت حدود ۹ مگابایت باشد تا از ۱۰ مگابایت بیشتر نشود
          TARGET_SIZE_BYTES=9437184
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BYTES}  0.9 / (${BITRATE}/8), 2))")

          # جلوگیری از SEG_TIME خیلی کم
          if (( $(echo "$SEG_TIME < 10" | bc -l) )); then SEG_TIME=30; fi

          EXT="${FILE##*.}"
          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"

          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            SUCCESS=0
            for ATTEMPT in 1 2 3; do
              if [ "$QUALITY" = "audio" ]; then

                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" -F "caption=🎬 پارت ${COUNT}/${TOTAL} (${QUALITY})")
              fi
              echo "$RESP" | grep -q '"ok":true' && SUCCESS=1 && break
              sleep 2
            done
            [ $SUCCESS -eq 0 ] && echo "Failed to send part $COUNT"
            COUNT=$((COUNT + 1))
            sleep 1
          done

      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ عملیات با موفقیت انجام شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطا در دانلود یا ارسال."
          fi
