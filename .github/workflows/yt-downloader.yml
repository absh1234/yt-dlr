name: 🎬 YT → Bale (Proxy + Multi‑VPN Test)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
      quality:
        description: 'Quality (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'Target Chat ID'
        required: true
      vpn_configs:
        description: 'VLESS/VMess/Trojan/SS links or Xray JSON (one per line)'
        required: true
        default: ''

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Cache tools ----------
      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/yt-dlp
            ~/tools/xray
          key: tools-${{ runner.os }}-v4

      - name: Download yt‑dlp (if not cached)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Download Xray core (if not cached)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/xray
          curl -fsSL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray
          rm xray.zip

      - name: Add tools to PATH
        run: |
          echo "$HOME/tools" >> $GITHUB_PATH
          echo "$HOME/tools/xray" >> $GITHUB_PATH

      # ---------- Cache static FFmpeg ----------
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tools/ffmpeg
          key: ${{ runner.os }}-ffmpeg-static-v4

      - name: Setup ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools/ffmpeg
          curl -fsSL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar xJ -C ~/tools/ffmpeg --strip-components=1
          chmod +x ~/tools/ffmpeg/ffmpeg ~/tools/ffmpeg/ffprobe

      - name: Add ffmpeg to PATH
        run: echo "$HOME/tools/ffmpeg" >> $GITHUB_PATH

      # ---------- VPN config parser & tester ----------
      - name: Set up Python & test configs
        run: |
          # Save the user's input as a file, one line per config
          echo "${{ inputs.vpn_configs }}" > configs_raw.txt

          # Python script to convert links to Xray outbound JSON and test them
          python3 << 'PYEOF'
          import base64, json, os, subprocess, sys, time, urllib.request

          def parse_share_link(link):
              """Convert common share link to Xray outbound JSON. Returns None if fails."""
              try:
                  if link.startswith('vless://') or link.startswith('vmess://') or \
                     link.startswith('trojan://') or link.startswith('ss://'):
                      return link_to_xray(link)
                  else:
                      # Assume it's already a JSON outbound config
                      return json.loads(link)
              except Exception:
                  return None

          def link_to_xray(link):
              """Basic converter for common protocols. Returns a dict."""
              from urllib.parse import urlparse, parse_qs
              parsed = urlparse(link)
              if parsed.scheme in ('vless', 'vmess', 'trojan'):
                  # VLESS/VMess/Trojan share links: scheme://uuid@host:port?params#name
                  uuid = parsed.username
                  host = parsed.hostname
                  port = int(parsed.port)
                  params = parse_qs(parsed.query)
                  name = parsed.fragment or 'proxy'
                  sni = params.get('sni', [host])[0]
                  security = params.get('security', ['none'])[0]
                  network = params.get('type', ['tcp'])[0]
                  path = params.get('path', ['/'])[0]
                  if security == 'tls':
                      stream_settings = {
                          "network": network,
                          "security": "tls",
                          "tlsSettings": {"serverName": sni}
                      }
                  else:
                      stream_settings = {"network": network}
                  if network == 'ws':
                      stream_settings["wsSettings"] = {"path": path}
                  if network == 'grpc':
                      stream_settings["grpcSettings"] = {"serviceName": path.lstrip('/')}
                  if parsed.scheme == 'vmess':
                      # VMess needs id in settings
                      return {
                          "tag": name,
                          "protocol": "vmess",
                          "settings": {
                              "vnext": [{
                                  "address": host,
                                  "port": port,
                                  "users": [{"id": uuid, "security": "auto"}]
                              }]
                          },
                          "streamSettings": stream_settings
                      }
                  elif parsed.scheme == 'vless':
                      return {
                          "tag": name,
                          "protocol": "vless",
                          "settings": {
                              "vnext": [{
                                  "address": host,
                                  "port": port,
                                  "users": [{"id": uuid, "encryption": "none"}]
                              }]
                          },
                          "streamSettings": stream_settings
                      }
                  elif parsed.scheme == 'trojan':
                      return {
                          "tag": name,
                          "protocol": "trojan",
                          "settings": {
                              "servers": [{
                                  "address": host,
                                  "port": port,
                                  "password": uuid
                              }]
                          },
                          "streamSettings": stream_settings
                      }
              elif parsed.scheme == 'ss':
                  # ShadowSocks: ss://base64(method:password)@host:port#name
                  user_info = base64.urlsafe_b64decode(parsed.username).decode()
                  method, password = user_info.split(':', 1)
                  return {
                      "tag": parsed.fragment or 'ss',
                      "protocol": "shadowsocks",
                      "settings": {
                          "servers": [{
                              "address": parsed.hostname,
                              "port": int(parsed.port),
                              "method": method,
                              "password": password
                          }]
                      }
                  }
              return None

          # Read configs from file
          with open('configs_raw.txt', 'r') as f:
              lines = [line.strip() for line in f if line.strip()]

          outbounds = []
          for line in lines:
              ob = parse_share_link(line)
              if ob:
                  outbounds.append(ob)
              else:
                  print(f"Skipping invalid config: {line[:50]}...")

          if not outbounds:
              print("No valid configs provided!")
              sys.exit(1)

          # Test each outbound by building a minimal Xray config and measuring latency
          results = []
          for i, outbound in enumerate(outbounds):
              tag = outbound.get('tag', f'proxy-{i}')
              print(f"Testing {tag}...", end=' ')
              # Minimal Xray config: inbound socks5 on 10808, this outbound as only outbound
              xray_conf = {
                  "inbounds": [{
                      "port": 10808,
                      "protocol": "socks",
                      "settings": {"auth": "noauth"}
                  }],
                  "outbounds": [outbound]
              }
              with open(f'test_config_{i}.json', 'w') as f:
                  json.dump(xray_conf, f)

              # Run Xray in background with this config
              proc = subprocess.Popen(['xray', 'run', '-config', f'test_config_{i}.json'],
                                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              time.sleep(2)
              try:
                  start = time.time()
                  req = urllib.request.Request('https://www.youtube.com/favicon.ico',
                                               headers={'User-Agent': 'curl/7.68.0'})
                  # Use socks5 proxy
                  proxy_handler = urllib.request.ProxyHandler({'https': 'socks5://127.0.0.1:10808'})
                  opener = urllib.request.build_opener(proxy_handler)
                  resp = opener.open(req, timeout=10)
                  resp.read()
                  latency = time.time() - start
                  results.append((latency, outbound, tag))
                  print(f"OK ({latency:.2f}s)")
              except Exception as e:
                  print(f"FAILED ({e})")
              finally:
                  proc.terminate()
                  try:
                      proc.wait(timeout=5)
                  except subprocess.TimeoutExpired:
                      proc.kill()
              # Clean up test config
              os.remove(f'test_config_{i}.json')

          if not results:
              print("All proxies failed.")
              sys.exit(1)

          # Pick the fastest
          results.sort()
          best_latency, best_outbound, best_tag = results[0]
          print(f"Selected proxy: {best_tag} (latency {best_latency:.2f}s)")

          # Write the final Xray config with this outbound (and a direct outbound for non-proxy traffic)
          final_conf = {
              "inbounds": [{
                  "port": 10808,
                  "protocol": "socks",
                  "settings": {"auth": "noauth"}
              }],
              "outbounds": [
                  best_outbound,
                  {"protocol": "freedom", "tag": "direct"}
              ],
              "routing": {
                  "rules": [
                      {
                          "type": "field",
                          "outboundTag": "direct",
                          "domain": ["geosite:cn", "geosite:private"]
                      }
                  ]
              }
          }
          with open('final_config.json', 'w') as f:
              json.dump(final_conf, f, indent=2)
          PYEOF


      - name: Start Xray proxy
        run: |
          xray run -config final_config.json > /tmp/xray.log 2>&1 &
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 10808; then
              echo "Proxy is listening."
              break
            fi
            sleep 1
          done
          if ! nc -z 127.0.0.1 10808; then
            echo "ERROR: Proxy did not start. Log:"
            cat /tmp/xray.log
            exit 1
          fi
          curl -s --socks5 127.0.0.1:10808 https://www.youtube.com/favicon.ico -o /dev/null -w '%{http_code}' && echo "✅ Proxy works"

  
    #---------------download---------
      - name: Download media from YouTube
        run: |
          # No cookies – rely on the proxy + mobile clients to avoid challenges
          YT_FLAGS=(
            --proxy socks5://127.0.0.1:10808
            --user-agent "com.google.android.youtube/19.45.2 (Linux; U; Android 14; en_US)"
            --extractor-args "youtube:player_client=android,web_embedded"
            --extractor-retries 5
            --retries 5
            -o "media.%(ext)s"
            "${{ inputs.url }}"
          )

          case "${{ inputs.quality }}" in
            best)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              FILE="media.mp4"
              ;;
            720p)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              FILE="media.mp4"
              ;;
            audio)
              yt-dlp "${YT_FLAGS[@]}" \
                -f "bestaudio" --extract-audio --audio-format mp3
              FILE="media.mp3"
              ;;
          esac

          if [ ! -f "$FILE" ]; then
            echo "❌ Download failed"
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "SIZE=$(stat -c%s "$FILE")" >> $GITHUB_ENV

            # ---------- Split if > 10 MB ----------
      - name: Split video if needed
        if: env.SIZE > 10485760
        run: |
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$FILE")
          SEG_TIME=$(python3 -c "print(round($DURATION * (10000000 / $SIZE) * 0.9, 2))")
          mkdir -p parts
          ffmpeg -v quiet -i "$FILE" -c copy -map 0 -segment_time "$SEG_TIME" -f segment -reset_timestamps 1 "parts/part_%03d.${FILE##*.}"
          echo "TOTAL_PARTS=$(ls parts/part_* | wc -l)" >> $GITHUB_ENV

      # ---------- Send to Bale ----------
      - name: Send media to Bale
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          VIDEO_URL="${{ inputs.url }}"

          send_file() {
            local file="$1"
            local caption="$2"
            local attempt=1
            while [ $attempt -le 3 ]; do
              ENC_CAPTION=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$caption'))")
              RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=${ENC_CAPTION}" \
                -F "document=@$file")
              if [ "$(echo "$RESPONSE" | jq -r '.ok')" = "true" ]; then
                return 0
              fi
              sleep 2
              attempt=$((attempt + 1))
            done
            return 1
          }

          if [ "$SIZE" -le 10485760 ]; then
            send_file "$FILE" "🎬 $VIDEO_URL" || {
              curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ Failed to send file"
            }
          else
            cd parts
            TOTAL=$TOTAL_PARTS
            COUNT=1
            for part in part_*; do
              send_file "$part" "🎬 $VIDEO_URL - Part $COUNT/$TOTAL" || {
                curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ Failed to send part $COUNT"
              }
              COUNT=$((COUNT + 1))
              sleep 1
            done
          fi

      # ---------- Final status ----------
      - name: Final report
        if: always()
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"

          # Check what failed and build appropriate message
          if [ "${{ job.status }}" = "success" ]; then
            TEXT="✅ عملیات موفق بود"
          elif [ ! -f final_config.json ]; then
            TEXT="❌ وی پی ان مشکل دارد"
          elif [ ! -f "${{ env.FILE }}" ] && [ -f final_config.json ]; then
            # VPN worked but download failed
            TEXT="❌ وی پی ان کار میکند اما دسترسی به یوتوب غیر ممکن بود"
          elif [ "${{ env.FILE }}" ] && [ ! -f parts/part_001.mp4 ] && [ "${{ env.SIZE }}" -gt 10485760 ]; then
            TEXT="⚠️ پارتیشن بدنی با شکست مواجه شد(احتمالا فایل بزرگ است)"
          else
            TEXT="❌ عملیات ناموفق بود"
          fi

          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TEXT'))")
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${ENCODED}"
