name: YT Downloader Advanced

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL"
        required: true
      quality:
        description: "best / 720 / audio"
        required: true
        default: "best"
      mode:
        description: "piped / ytdlp / ytdlp-vpn"
        required: true
        default: "piped"

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl jq
          pip install yt-dlp

      # -------------------------
      # Install Xray (optional)
      # -------------------------
      - name: Install Xray
        if: ${{ github.event.inputs.mode == 'ytdlp-vpn' }}
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip
          chmod +x xray
          mkdir xray-bin
          mv xray xray-bin/

      - name: Setup Xray config
        if: ${{ github.event.inputs.mode == 'ytdlp-vpn' }}
        run: |
          cat <<EOF > config.json
          {
            "log": { "loglevel": "warning" },
            "inbounds": [
              {
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "socks",
                "settings": { "udp": true }
              }
            ],
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [{
                    "address": "gwna1itwdw8-5ro7g-kp72r8st8jcbul.abolfazlsh444.workers.dev",
                    "port": 443,
                    "users": [{
                      "id": "dc90d0ad-4897-4422-8d98-ae81d18576de",
                      "encryption": "none"
                    }]
                  }]
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "tls",
                  "wsSettings": {
                    "path": "/eyJqdW5rIjoiWjRQN3pUN2I1dG8iLCJwcm90b2NvbCI6InZsIiwibW9kZSI6InByb3h5aXAiLCJwYW5lbElQcyI6W119?ed=2560"
                  }
                }
              }
            ]
          }
          EOF

      - name: Start Xray
        if: ${{ github.event.inputs.mode == 'ytdlp-vpn' }}
        run: |
          ./xray-bin/xray -config config.json &
          sleep 5

      # -------------------------
      # MODE 1: PIPED
      # -------------------------
      - name: Download via Piped
        if: ${{ github.event.inputs.mode == 'piped' }}
        run: |
          VIDEO_ID=$(echo "${{ github.event.inputs.url }}" | sed 's/.*v=//')
          API="https://piped.video/api/v1/streams/$VIDEO_ID"
          curl -s $API -o streams.json
          URL=$(jq -r '.videoStreams[0].url' streams.json)
          curl -L "$URL" -o output.mp4

      # -------------------------
      # MODE 2: YT-DLP DIRECT
      # -------------------------
      - name: Download via yt-dlp
        if: ${{ github.event.inputs.mode == 'ytdlp' }}
        run: |
          yt-dlp -f best -o output.mp4 "${{ github.event.inputs.url }}"

      # -------------------------
      # MODE 3: YT-DLP + VPN
      # -------------------------
      - name: Download via yt-dlp + Xray
        if: ${{ github.event.inputs.mode == 'ytdlp-vpn' }}
        run: |
          export ALL_PROXY=socks5://127.0.0.1:10808
          yt-dlp -f best -o output.mp4 "${{ github.event.inputs.url }}"

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output.mp4
