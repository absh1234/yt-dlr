name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
      XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
    steps:
      # ================== ابزارهای اولیه ==================
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-v11

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Setup Xray (only if config provided)
        if: steps.cache.outputs.cache-hit != 'true' && env.XRAY_CONFIG != ''
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      - name: Add tools to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      # ================== اجرای پروکسی (در صورت وجود) ==================
      - name: Run Xray proxy
        if: env.XRAY_CONFIG != ''
        run: |
          echo "$XRAY_CONFIG" > config.json
          ~/tools/xray/xray run -config config.json &
          for i in {1..10}; do
            nc -z 127.0.0.1 10808 && break
            sleep 2
          done

      # ================== دانلود ویدیو/صدا ==================
      - name: Download media from YouTube
        id: download
        run: |
          PROXY=""
          if nc -z 127.0.0.1 10808 2>/dev/null; then
            PROXY="--proxy socks5://127.0.0.1:10808"
            echo "Using proxy"
          else
            echo "No proxy, direct download"
          fi

          case "${{ inputs.quality }}" in
            best)
              yt-dlp $PROXY -f "bestvideo+bestaudio/best" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            720p)
              yt-dlp $PROXY -f "bestvideo[height<=720]+bestaudio/best[height<=720]" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            audio)
              yt-dlp $PROXY -f "bestaudio" --extract-audio --audio-format mp3 -o "media.%(ext)s" "${{ inputs.url }}" ;;
          esac

          FILE=$(ls media.* 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "❌ دانلود ناموفق بود."
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "File: $FILE"
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV
          echo "Size: $SIZE bytes"

      # ================== تقسیم هوشمند و ارسال ==================
      - name: Split and send media parts
        run: |
          TOKEN="${BALE_TOKEN}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="${FILE}"
          SIZE="${SIZE}"
          QUALITY="${{ inputs.quality }}"

          # اگر فایل کوچک‌تر از ۱۰ مگابایت است، مستقیم ارسال کن
          if [ "$SIZE" -le 10485760 ]; then
            echo "فایل کوچک است، ارسال مستقیم..."
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" \
                -F "caption=🎵 فایل صوتی شما"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" \
                -F "caption=🎬 ویدیوی شما (کیفیت ${QUALITY})"
            fi
            exit 0
          fi

          # استخراج مدت زمان و نرخ بیت
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          echo "Duration: ${DURATION} sec"
          # نرخ بیت میانگین (بیت بر ثانیه)
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / float(${DURATION})))")
          echo "Average bitrate: ${BITRATE} bps"

          # محاسبه زمان هر قطعه برای حدود ۹ مگابایت (۹ مگابایت = 75497472 بیت)
          TARGET_SIZE_BIT=75497472
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BIT} / float(${BITRATE}), 2))")
          # کمی حاشیه امن
          SEG_TIME=$(python3 -c "print(round(${SEG_TIME} * 0.95, 2))")
          echo "Segment time: ${SEG_TIME} sec"

          # پسوند فایل
          EXT="${FILE##*.}"

          # تقسیم با ffmpeg (کپی جریان‌ها)
          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"

          # شمارش قطعات
          TOTAL=$(ls part_*.${EXT} | wc -l)
          echo "Total parts: ${TOTAL}"

          COUNT=1
          for PART in part_*.${EXT}; do
            echo "Sending ${PART} (${COUNT}/${TOTAL})"
            SUCCESS=0
            for ATTEMPT in 1 2 3 4 5; do
              if [ "$QUALITY" = "audio" ]; then
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" \
                  -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" \
                  -F "caption=🎬 پارت ${COUNT}/${TOTAL} (کیفیت ${QUALITY})")
              fi
              if echo "$RESP" | grep -q '"ok":true'; then
                SUCCESS=1
                break
              fi
              sleep 4
            done
            if [ $SUCCESS -eq 0 ]; then
              curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ خطا در ارسال پارت ${COUNT}"
            fi
            COUNT=$((COUNT + 1))
            sleep 2
          done

          # پیام راهنما (اختیاری)
          if [ "$QUALITY" != "audio" ]; then
            MERGE_CMD="ffmpeg -f concat -safe 0 -i <(for f in part_*.${EXT}; do echo \"file '\$PWD/\$f'\"; done) -c copy merged.${EXT}"
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "📌 برای ادغام مجدد قطعات در لینوکس/مک:\n${MERGE_CMD}" | jq -sRr @uri)"
          fi

      # ================== گزارش نهایی ==================
      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ عملیات دانلود و ارسال با موفقیت کامل شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی در عملیات رخ داد."
          fi
