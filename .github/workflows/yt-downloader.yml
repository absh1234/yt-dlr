name: 🎬 YouTube Downloader to Bale (Stable via Piped)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl jq

      - name: Extract video ID and get streams
        id: streams
        run: |
          # Extract video ID from various YouTube URL formats
          VIDEO_ID=$(echo "${{ inputs.url }}" | sed -n 's/.*[?&]v=\([^&]*\).*/\1/p; s/.*youtu.be\/\([^?]*\).*/\1/p; s/.*youtube.com\/embed\/\([^?]*\).*/\1/p' | tail -1)
          [ -z "$VIDEO_ID" ] && echo "Invalid URL" && exit 1
          echo "Video ID: $VIDEO_ID"

          # Fetch streams from Piped API (pick a stable instance)
          API="https://pipedapi.kavin.rocks/streams/${VIDEO_ID}"
          echo "Fetching streams..."
          STREAMS=$(curl -s "$API")

          # Select appropriate stream based on quality choice
          if [ "${{ inputs.quality }}" = "audio" ]; then
            # Get best audio stream (m4a or webm)
            STREAM_URL=$(echo "$STREAMS" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].url')
            EXT=$(echo "$STREAMS" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].quality' | sed 's/.*\.//')
            [ -z "$EXT" ] && EXT="m4a"
          elif [ "${{ inputs.quality }}" = "720p" ]; then
            # Get video+audio combined up to 720p (if exists)
            STREAM_URL=$(echo "$STREAMS" | jq -r '.videoStreams | map(select(.height <= 720 and .format? == "hd720")) | sort_by(-.height) | .[0].url')
            EXT="mp4"
            # If no combined, fallback to best video+audio merge
            if [ "$STREAM_URL" = "null" ]; then
              VID_URL=$(echo "$STREAMS" | jq -r '.videoStreams | map(select(.height <= 720)) | sort_by(-.height) | .[0].url')
              AUD_URL=$(echo "$STREAMS" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].url')
            fi
          else  # best
            # Try to get best combined (sometimes available)
            STREAM_URL=$(echo "$STREAMS" | jq -r '.videoStreams | sort_by(-.height) | .[0].url')
            EXT="mp4"
            if [ "$STREAM_URL" = "null" ]; then
              VID_URL=$(echo "$STREAMS" | jq -r '.videoStreams | sort_by(-.height) | .[0].url')
              AUD_URL=$(echo "$STREAMS" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].url')
            fi
          fi

          echo "STREAM_URL=$STREAM_URL" >> $GITHUB_ENV
          echo "VID_URL=$VID_URL" >> $GITHUB_ENV
          echo "AUD_URL=$AUD_URL" >> $GITHUB_ENV
          echo "EXT=$EXT" >> $GITHUB_ENV

      - name: Download and (if needed) merge
        run: |
          if [ -n "$STREAM_URL" ] && [ "$STREAM_URL" != "null" ]; then
            # Download single stream
            curl -L "$STREAM_URL" -o "media.$EXT"
          else
            # Download video and audio separately, then merge
            curl -L "$VID_URL" -o video.mp4
            curl -L "$AUD_URL" -o audio.m4a
            ffmpeg -i video.mp4 -i audio.m4a -c copy -map 0:v -map 1:a "media.mp4"
          fi

          FILE=$(ls media.* 2>/dev/null | head -n1)
          [ -z "$FILE" ] && echo "دانلود ناموفق" && exit 1
          echo "FILE=$FILE" >> $GITHUB_ENV
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      - name: Split and send to Bale
        run: |
          TOKEN="$BALE_TOKEN"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="$FILE"
          SIZE="$SIZE"
          QUALITY="${{ inputs.quality }}"

          if [ "$SIZE" -le 10485760 ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" -F "caption=🎵 فایل صوتی"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" -F "caption=🎬 ویدیوی شما (${QUALITY})"
            fi
            exit 0
          fi

          # Split for larger files
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / float(${DURATION})))")
          TARGET_SIZE_BIT=75497472
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BIT} / float(${BITRATE}) * 0.95, 2))")
          EXT="${FILE##*.}"
          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"
          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            SUCCESS=0
            for ATTEMPT in 1 2 3 4 5; do
              if [ "$QUALITY" = "audio" ]; then
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" -F "caption=🎬 پارت ${COUNT}/${TOTAL} (${QUALITY})")
              fi
              echo "$RESP" | grep -q '"ok":true' && SUCCESS=1 && break
              sleep 4
            done
            [ $SUCCESS -eq 0 ] && curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ خطا در ارسال پارت ${COUNT}"
            COUNT=$((COUNT + 1))
            sleep 2
          done

      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ دانلود و ارسال با موفقیت انجام شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی در عملیات رخ داد."
          fi
