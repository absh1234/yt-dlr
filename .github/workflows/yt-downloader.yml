name: 🎬 YouTube Downloader to Bale (Optimized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      # ۱. استفاده از اکشن آماده برای نصب پایتون (بسیار سریع‌تر از apt install)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # این خط باعث کش شدن کتابخانه‌های پایتون می‌شود

      # ۲. نصب ابزارهای ضروری (فقط کتابخانه‌های پایتون که زمان‌بر هستند کش می‌شوند)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      # ۳. مرحله استخراج ویدیو (نسخه اصلاح شده و بسیار پایدار)
      - name: Extract video ID and get streams
        id: streams
        run: |
          # استخراج ویدیو آی‌دی
          VIDEO_ID=$(echo "${{ inputs.url }}" | sed -n 's/.[?&]v=\([^&]*\).*/\1/p; s/.*youtu.be\/\([^?]*\).*/\1/p; s/.*youtube.com\/embed\/\([^?]*\).*/\1/p' | tail -1)
          if [ -z "$VIDEO_ID" ]; then echo "Invalid URL"; exit 1; fi
          echo "Video ID: $VIDEO_ID"

          # لیست اینستنس‌های پایدارتر
          INSTANCES=("pipedapi.kavin.rocks" "pipedapi.canary.yt" "pipedapi.privacy.dev" "pipedapi.dev")

          SUCCESS=false
          for INSTANCE in "${INSTANCES[@]}"; do
            echo "Trying instance: $INSTANCE"
            # استفاده از User-Agent برای جلوگیری از بلاک شدن توسط یوتیوب/پایپد
            API="https://$INSTANCE/streams/${VIDEO_ID}"
            RESPONSE=$(curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" --connect-timeout 15 "$API")

            # چک کردن دقیق JSON بودن پاسخ
            if [[ "$RESPONSE" == \{* ]] && echo "$RESPONSE" | jq -e '.videoStreams' > /dev/null 2>&1; then
              echo "Successfully connected to $INSTANCE"
              echo "STREAMS=$RESPONSE" >> $GITHUB_ENV
              SUCCESS=true
              break
            fi
            echo "Instance $INSTANCE failed, trying next..."
          done


          if [ "$SUCCESS" = false ]; then
            echo "Error: All Piped instances failed. Trying direct yt-dlp fallback..."
            # اگر تمام اینستنس‌ها شکست خوردند، مستقیماً از yt-dlp استفاده کن (راه حل نهایی)
            echo "FALLBACK_MODE=true" >> $GITHUB_ENV
            SUCCESS=true
          fi

      # ۴. مرحله دانلود و ارسال (با استفاده از yt-dlp که بسیار قدرتمندتر است)
      - name: Download and Send
        run: |
          if [ "${{ env.FALLBACK_MODE }}" = "true" ]; then
            echo "Using direct yt-dlp fallback..."
            # دانلود مستقیم بدون نیاز به Piped API (بسیار پایدارتر)
            # اگر کیفیت audio بود، فقط صدا را دانلود کن
            if [ "${{ inputs.quality }}" = "audio" ]; then
               yt-dlp -x --audio-format mp3 -o "video.mp3" "${{ inputs.url }}"
            else
               yt-dlp -f "bestvideo+bestaudio/best" -o "video.mp4" "${{ inputs.url }}"
            fi
            FILE_NAME="video.mp4"
            [ "${{ inputs.quality }}" = "audio" ] && FILE_NAME="video.mp3"
          else
            # اگر Piped کار کرد، از همان استریم‌های API استفاده کن (بخش کد قبلی شما اینجا قرار می‌گیرد)
            # اما برای سادگی، پیشنهاد من استفاده از همان yt-dlp در بالا است.
            # اگر می‌خواهید حتماً از API استفاده کنید، کد استخراج از JSON را اینجا بنویسید.
            echo "Using Piped API streams..."
            # (بخش مربوط به پردازش JSON استریم‌ها را اینجا قرار دهید)
            # جهت جلوگیری از پیچیدگی، فعلاً از yt-dlp استفاده می‌کنیم که خودش همه این کارها را انجام می‌دهد.
            yt-dlp -o "video.mp4" "${{ inputs.url }}"
            FILE_NAME="video.mp4"
          fi

          # ارسال به بله (با استفاده از curl)
          curl -F "file=@$FILE_NAME" "https://api.bale.ai/bot/sendDocument?token=${{ secrets.BALE_BOT_TOKEN }}&chat_id=${{ inputs.target_chat_id }}"
