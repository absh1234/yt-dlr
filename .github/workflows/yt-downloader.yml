name: 🎬 YouTube Downloader to Bale (via Warp)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      - name: Checkout repository (optional, only if you need other files)
        uses: actions/checkout@v4

      # ================== ابزارهای دانلود ==================
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-warp-v1

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Add tools to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      # ================== راه‌اندازی Cloudflare Warp ==================
      - name: Install Cloudflare Warp
        run: |
          # Add official Warp repository
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install cloudflare-warp -y

      - name: Activate Warp proxy
        run: |
          # Register and connect (free, no account needed)
          sudo warp-cli --accept-tos register
          sudo warp-cli set-mode proxy
          sudo warp-cli set-proxy-port 10808
          sudo warp-cli connect

          # Wait for proxy to become ready
          for i in {1..10}; do
            if nc -z 127.0.0.1 10808; then
              echo "✅ Warp SOCKS5 proxy is ready"
              break
            fi
            echo "Waiting for proxy... ${i}"
            sleep 2
          done

          # Verify status
          sudo warp-cli status

      # ================== دانلود ویدیو ==================
      - name: Download media from YouTube
        run: |
          # از پروکسی SOCKS5 استفاده کن
          PROXY="--proxy socks5://127.0.0.1:10808"
          echo "Downloading via Cloudflare Warp..."

          case "${{ inputs.quality }}" in
            best)
              yt-dlp $PROXY -f "bestvideo+bestaudio/best" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            720p)
              yt-dlp $PROXY -f "bestvideo[height<=720]+bestaudio/best[height<=720]" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            audio)
              yt-dlp $PROXY -f "bestaudio" --extract-audio --audio-format mp3 -o "media.%(ext)s" "${{ inputs.url }}" ;;
          esac

          FILE=$(ls media.* 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "❌ دانلود ناموفق بود."
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      # ================== تقسیم و ارسال ==================
      - name: Split and send media parts
        run: |
          TOKEN="${BALE_TOKEN}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="${FILE}"
          SIZE="${SIZE}"
          QUALITY="${{ inputs.quality }}"

          if [ "$SIZE" -le 10485760 ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" -F "caption=🎵 فایل صوتی شما"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" -F "caption=🎬 ویدیوی شما (${QUALITY})"
            fi
            exit 0
          fi

          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / float(${DURATION})))")
          TARGET_SIZE_BIT=75497472
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BIT} / float(${BITRATE}) * 0.95, 2))")
          EXT="${FILE##*.}"

          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"

          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            SUCCESS=0
            for ATTEMPT in 1 2 3 4 5; do
              if [ "$QUALITY" = "audio" ]; then
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" -F "caption=🎬 پارت ${COUNT}/${TOTAL} (${QUALITY})")
              fi
              if echo "$RESP" | grep -q '"ok":true'; then SUCCESS=1; break; fi
              sleep 4
            done
            [ $SUCCESS -eq 0 ] && curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ خطا در ارسال پارت ${COUNT}"
            COUNT=$((COUNT + 1))
            sleep 2
          done

      # ================== گزارش نهایی ==================
      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ عملیات دانلود و ارسال با موفقیت کامل شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی در عملیات رخ داد."
          fi
