name: 🎬 YouTube Downloader to Bale (Final)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3

      - name: Download video via Piped API (Python)
        run: |
          python3 << 'PYEOF'
      import sys, urllib.request, json, re, os, subprocess

      video_url = "${{ inputs.url }}"
      quality = "${{ inputs.quality }}"
      # استخراج شناسه ویدیو
      patterns = [
          r'(?:v=|\/)([0-9A-Za-z_-]{11})',
          r'youtu\.be\/([0-9A-Za-z_-]{11})',
      ]
      video_id = None
      for p in patterns:
          m = re.search(p, video_url)
          if m:
              video_id = m.group(1)
              break
      if not video_id:
          print("Invalid YouTube URL")
          sys.exit(1)

      # انتخاب Piped API (چند نمونه برای پایداری)
      piped_instances = [
          "https://pipedapi.kavin.rocks",
          "https://pipedapi.tokhmi.xyz",
          "https://pipedapi.adminforge.de",
      ]
      streams = None
      for api in piped_instances:
          try:
              url = f"{api}/streams/{video_id}"
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  streams = json.loads(resp.read().decode())
                  break
          except Exception as e:
              continue
      if not streams:
          print("Could not fetch stream info")
          sys.exit(1)

      # توابع کمکی برای دریافت URL کامل
      def resolve_url(raw_url):
          if not raw_url:
              return None
          if raw_url.startswith('http'):
              return raw_url
          # برخی نمونه‌ها مسیر نسبی می‌دهند
          return f"{api}{raw_url}"

      video_streams = streams.get('videoStreams', [])
      audio_streams = streams.get('audioStreams', [])

      if quality == 'audio':
          # بهترین کیفیت صدا
          best_audio = max(audio_streams, key=lambda x: x.get('bitrate', 0), default=None)
          if not best_audio:
              print("No audio stream")
              sys.exit(1)
          audio_url = resolve_url(best_audio.get('url'))
          if not audio_url:
              print("Audio URL missing")
              sys.exit(1)
          ext = best_audio.get('quality', 'm4a').split('.')[-1] or 'm4a'
          urllib.request.urlretrieve(audio_url, f"media.{ext}")
          print(f"Downloaded audio: media.{ext}")
      else:
          # ویدیو: بهترین کیفیت ترکیبی یا جدا
          combined = [s for s in video_streams if s.get('quality') and 'webm' not in s.get('quality')]
          if quality == '720p':
              combined = [s for s in combined if s.get('height', 0) <= 720]
          if not combined and quality == 'best':
              combined = video_streams  # fallback to all
          best_video = max(combined, key=lambda x: (x.get('height', 0), x.get('bitrate', 0)), default=None)

          if best_video and 'url' in best_video:
              video_url = resolve_url(best_video['url'])
              if video_url:
                  # اگر ترکیبی صدا هم دارد، مستقیم دانلود کن
                  if best_video.get('audioTrackName') or best_video.get('audioBitrate'):
                      urllib.request.urlretrieve(video_url, "media.mp4")
                      print("Downloaded combined video")
                  else:
                      # دانلود ویدیو و صدا جدا و ادغام
                      best_audio = max(audio_streams, key=lambda x: x.get('bitrate', 0), default=None)
                      if not best_audio:
                          print("No audio for merge")
                          sys.exit(1)
                      audio_url = resolve_url(best_audio.get('url'))
                      if not audio_url:
                          print("Audio URL missing")
                          sys.exit(1)
                      urllib.request.urlretrieve(video_url, "video.mp4")
                      urllib.request.urlretrieve(audio_url, "audio.m4a")
                      subprocess.run(['ffmpeg', '-y', '-i', 'video.mp4', '-i', 'audio.m4a', '-c', 'copy', 'media.mp4'], check=True)
                      print("Merged video+audio")
                  ext = 'mp4'
              else:
                  sys.exit(1)
          else:
              # fallback: فقط صدا
              print("No suitable video; downloading audio only")
              best_audio = max(audio_streams, key=lambda x: x.get('bitrate', 0), default=None)
              audio_url = resolve_url(best_audio['url'])
              ext = best_audio.get('quality', 'm4a').split('.')[-1] or 'm4a'
              urllib.request.urlretrieve(audio_url, f"media.{ext}")

      # تعیین فایل نهایی
      import glob
      files = glob.glob('media.*') + glob.glob('media.mp4') + glob.glob('media.m4a')
      if not files:
          print("No downloaded file")
          sys.exit(1)
      final_file = files[0]
      size = os.path.getsize(final_file)
      with open(os.environ['GITHUB_ENV'], 'a') as f:
          f.write(f"FILE={final_file}\n")
          f.write(f"SIZE={size}\n")
      print(f"File: {final_file}, Size: {size}")
      PYEOF

      - name: Split and send to Bale
        run: |
          TOKEN="$BALE_TOKEN"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="$FILE"
          SIZE="$SIZE"
          QUALITY="${{ inputs.quality }}"

          if [ "$SIZE" -le 10485760 ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" -F "caption=🎵 فایل صوتی"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" -F "caption=🎬 ویدیوی شما (${QUALITY})"
            fi
            exit 0
          fi

          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / float(${DURATION})))")
          TARGET_SIZE_BIT=75497472
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BIT} / float(${BITRATE}) * 0.95, 2))")
          EXT="${FILE##*.}"
          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"
          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            SUCCESS=0
            for ATTEMPT in 1 2 3 4 5; do
              if [ "$QUALITY" = "audio" ]; then
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" -F "caption=🎬 پارت ${COUNT}/${TOTAL} (${QUALITY})")
              fi
              echo "$RESP" | grep -q '"ok":true' && SUCCESS=1 && break
              sleep 4
            done
            [ $SUCCESS -eq 0 ] && curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ خطا در ارسال پارت ${COUNT}"
            COUNT=$((COUNT + 1))
            sleep 2
          done

      - name: Report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ دانلود و ارسال با موفقیت انجام شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی رخ داد."
          fi
