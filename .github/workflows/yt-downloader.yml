name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
      XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
      SUB_URL: ${{ secrets.SUBSCRIPTION_URL }}
    steps:
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-v13

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Setup Xray
        if: steps.cache.outputs.cache-hit != 'true' && (env.XRAY_CONFIG != '' || env.SUB_URL != '')
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      - name: Add tools to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      - name: Generate Xray config & run proxy
        if: env.XRAY_CONFIG != '' || env.SUB_URL != ''
        run: |
          # ---- Build config.json ----
          if [ -n "$SUB_URL" ]; then
            python3 - "$SUB_URL" config.json << 'PYEOF'
      import sys, base64, json, re, urllib.request, socket, time, urllib.parse

      SUB_URL = sys.argv[1]
      OUT = sys.argv[2]

      def fetch(url):
          with urllib.request.urlopen(url, timeout=15) as r:
              data = r.read().decode('utf-8').strip()
              try: return base64.b64decode(data).decode('utf-8').strip()
              except: return data

      def parse_nodes(text):
          n = []
          for l in text.splitlines():
              l = l.strip()
              if l.startswith('vmess://'): n.append(('vmess', l[8:]))
              elif l.startswith('vless://'): n.append(('vless', l[8:]))
              elif l.startswith('trojan://'): n.append(('trojan', l[9:]))
          return n

      def parse_vmess(e):
          try:
              j = json.loads(base64.b64decode(e).decode())
              return {'addr': j['add'], 'port': int(j['port']), 'uuid': j['id'],
                      'net': j.get('net','tcp'), 'path': j.get('path','/'),
                      'host': j.get('host',''), 'tls': j.get('tls',''),
                      'sni': j.get('sni', j['add'])}
          except: return None

      def test(host, port, to=2):
          try:
              s = socket.socket(); s.settimeout(to)
              t0 = time.time()
              if s.connect_ex((host, port)) == 0:
                  return time.time() - t0
          except: pass
          return None

      def build(proto, n):
          out = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"port": 10808, "protocol": "socks",
                            "settings": {"auth": "noauth", "udp": True}}]
          }
          if proto == 'vmess':
              ob = {"protocol": "vmess", "settings": {"vnext": [{
                  "address": n['addr'], "port": n['port'],
                  "users": [{"id": n['uuid'], "security": "auto"}]}]},
                  "streamSettings": {"network": n['net'], "security": n.get('tls','none')}}
              if n['net'] == 'ws':
                  ob['streamSettings']['wsSettings'] = {"path": n['path'],
                      "headers": {"Host": n['host']}}
              if n.get('tls'):
                  ob['streamSettings']['tlsSettings'] = {"serverName": n.get('sni','')}
          elif proto == 'vless':
              ob = {"protocol": "vless", "settings": {"vnext": [{
                  "address": n['addr'], "port": n['port'],
                  "users": [{"id": n['uuid'], "encryption": "none"}]}]},
                  "streamSettings": {"network": 'tcp', "security": "none"}}
          elif proto == 'trojan':
              ob = {"protocol": "trojan", "settings": {"servers": [{
                  "address": n['addr'], "port": n['port'],
                  "password": n['uuid']}]},
                  "streamSettings": {"network": "tcp", "security": "tls",
                  "tlsSettings": {"serverName": n.get('sni', n['addr'])}}}
          else: return None
          out['outbounds'] = [ob]
          return out

      raw = fetch(SUB_URL)
      nodes = parse_nodes(raw)
      best = None; best_lat = 999
      for proto, data in nodes:
          if proto == 'vmess': info = parse_vmess(data)
          else: continue
          if not info: continue
          lat = test(info['addr'], info['port'])
          if lat and lat < best_lat:
              best_lat = lat; best = (proto, info)
      if not best: sys.exit(1)
      cfg = build(*best)
      with open(OUT, 'w') as f: json.dump(cfg, f, indent=2)
      print(f"Selected {best[0]} node {best[1]['addr']}:{best[1]['port']} ({best_lat*1000:.0f}ms)")
      PYEOF
          else:
            echo "$XRAY_CONFIG" > config.json
          # ---- Run proxy ----
          ~/tools/xray/xray run -config config.json &
          for i in $(seq 1 10); do nc -z 127.0.0.1 10808 && break; sleep 2; done

      - name: Download media from YouTube
        run: |
          PROXY=""
          if nc -z 127.0.0.1 10808 2>/dev/null; then
            PROXY="--proxy socks5://127.0.0.1:10808"
            echo "Using proxy"
          else
            echo "No proxy, direct download"
          fi
          case "${{ inputs.quality }}" in
            best)
              yt-dlp $PROXY -f "bestvideo+bestaudio/best" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            720p)
              yt-dlp $PROXY -f "bestvideo[height<=720]+bestaudio/best[height<=720]" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            audio)
              yt-dlp $PROXY -f "bestaudio" --extract-audio --audio-format mp3 -o "media.%(ext)s" "${{ inputs.url }}" ;;
          esac
          FILE=$(ls media.* 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then echo "دانلود ناموفق بود."; exit 1; fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      - name: Split and send media parts
        run: |
          TOKEN="${BALE_TOKEN}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="${FILE}"
          SIZE="${SIZE}"
          QUALITY="${{ inputs.quality }}"
          if [ "$SIZE" -le 10485760 ]; then
            if [ "$QUALITY" = "audio" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                -F "audio=@${FILE}" -F "caption=🎵 فایل صوتی شما"
            else
              curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${FILE}" -F "caption=🎬 ویدیوی شما (${QUALITY})"
            fi
            exit 0
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / float(${DURATION})))")
          TARGET_SIZE_BIT=75497472
          SEG_TIME=$(python3 -c "print(round(${TARGET_SIZE_BIT} / float(${BITRATE}) * 0.95, 2))")
          EXT="${FILE##*.}"
          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"
          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            SUCCESS=0
            for ATTEMPT in 1 2 3 4 5; do
              if [ "$QUALITY" = "audio" ]; then
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendAudio?chat_id=${CHAT_ID}" \
                  -F "audio=@${PART}" -F "caption=🎵 پارت ${COUNT}/${TOTAL}")
              else
                RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                  -F "video=@${PART}" -F "caption=🎬 پارت ${COUNT}/${TOTAL} (${QUALITY})")
              fi
              if echo "$RESP" | grep -q '"ok":true'; then SUCCESS=1; break; fi
              sleep 4
            done
            [ $SUCCESS -eq 0 ] && curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=⚠️ خطا در ارسال پارت ${COUNT}"
            COUNT=$((COUNT + 1))
            sleep 2
          done

      - name: Final report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ عملیات دانلود و ارسال با موفقیت کامل شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی در عملیات رخ داد."
          fi
