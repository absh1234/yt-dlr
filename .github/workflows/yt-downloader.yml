name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    env:
      BALE_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
    steps:
      - name: Cache yt-dlp
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-v1

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Add to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      - name: Download from YouTube
        run: |
          # تنظیمات ویژه برای دور زدن تحریم
          yt-dlp \
            --extractor-args "youtube:player_client=ios" \
            --no-check-certificate \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            -f "bestvideo[height<=720]+bestaudio/best[height<=720]" \
            -o "media.%(ext)s" \
            "${{ inputs.url }}"

          FILE=$(ls media.* 2>/dev/null | head -n1)
          [ -z "$FILE" ] && echo "دانلود ناموفق" && exit 1
          echo "FILE=$FILE" >> $GITHUB_ENV
          SIZE=$(stat -c%s "$FILE")
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      - name: Split and send to Bale
        run: |
          TOKEN="${BALE_TOKEN}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          FILE="${FILE}"
          SIZE="${SIZE}"

          if [ "$SIZE" -le 10485760 ]; then
            curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
              -F "video=@${FILE}" \
              -F "caption=🎬 ویدیوی شما"
            exit 0
          fi

          # تقسیم ویدیو
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "${FILE}")
          BITRATE=$(python3 -c "print(int(${SIZE} * 8 / ${DURATION}))")
          SEG_TIME=$(python3 -c "print(round(75497472 / ${BITRATE} * 0.95, 2))")
          EXT="${FILE##*.}"

          mkdir parts && cd parts
          ffmpeg -v quiet -stats -i "../${FILE}" -f segment -segment_time "${SEG_TIME}" \
            -c copy -reset_timestamps 1 "part_%03d.${EXT}"

          TOTAL=$(ls part_*.${EXT} | wc -l)
          COUNT=1
          for PART in part_*.${EXT}; do
            for ATTEMPT in 1 2 3 4 5; do
              RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}" \
                -F "video=@${PART}" \
                -F "caption=🎬 پارت ${COUNT}/${TOTAL}")
              echo "$RESP" | grep -q '"ok":true' && break
              sleep 4
            done
            COUNT=$((COUNT + 1))
            sleep 2
          done

      - name: Report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ دانلود و ارسال با موفقیت انجام شد."
          else
            curl -s "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطا در عملیات."
          fi
