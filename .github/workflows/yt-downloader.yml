name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (best, 720p, audio)'
        required: true
        default: 'best'
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده'
        required: true

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      # ------------------- ابزارهای اولیه -------------------
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/tools
          key: tools-${{ runner.os }}-v9

      - name: Setup yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Setup Xray (optional)
        if: steps.cache.outputs.cache-hit != 'true' && secrets.XRAY_CONFIG != ''
        run: |
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      - name: Add tools to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      # ------------------- اجرای پروکسی (در صورت وجود) -------------------
      - name: Run Xray proxy
        if: secrets.XRAY_CONFIG != ''
        run: |
          echo "$XRAY_CONFIG_JSON" > config.json
          ~/tools/xray/xray run -config config.json &
          # منتظر بمانیم تا پورت 10808 باز شود
          for i in {1..10}; do
            nc -z 127.0.0.1 10808 && break
            sleep 2
          done
        env:
          XRAY_CONFIG_JSON: ${{ secrets.XRAY_CONFIG }}

      # ------------------- دانلود ویدیو/صدا -------------------
      - name: Download media from YouTube
        run: |
          PROXY=""
          if nc -z 127.0.0.1 10808 2>/dev/null; then
            PROXY="--proxy socks5://127.0.0.1:10808"
            echo "Using proxy"
          else
            echo "No proxy, direct download"
          fi

          case "${{ inputs.quality }}" in
            best)
              yt-dlp $PROXY -f "bestvideo+bestaudio/best" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            720p)
              yt-dlp $PROXY -f "bestvideo[height<=720]+bestaudio/best[height<=720]" -o "media.%(ext)s" "${{ inputs.url }}" ;;
            audio)
              yt-dlp $PROXY -f "bestaudio" --extract-audio --audio-format mp3 -o "media.%(ext)s" "${{ inputs.url }}" ;;
          esac

          FILE=$(ls media.* 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "دانلود ناموفق بود."
            exit 1
          fi
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "File downloaded: $FILE"

      # ------------------- فشرده‌سازی (zip) -------------------
      - name: Create ZIP archive
        run: |
          zip -9 archive.zip "$FILE"
          SIZE=$(stat -c%s archive.zip)
          echo "ZIP_SIZE=$SIZE" >> $GITHUB_ENV
          echo "ZIP size: $SIZE bytes"

      # ------------------- ارسال مستقیم (اگر حجم ZIP ≤ ۱۰ مگابایت) -------------------
      - name: Send small ZIP directly
        if: env.ZIP_SIZE <= 10485760
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${{ inputs.target_chat_id }}" \
            -F "document=@archive.zip" \
            -F "caption=🎬 فایل دانلودشده از یوتیوب (کیفیت ${{ inputs.quality }})"

      # ------------------- تقسیم و ارسال پارتیشنی (حجم > ۱۰ مگابایت) -------------------
      - name: Split and send large ZIP in parts
        if: env.ZIP_SIZE > 10485760
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          mkdir parts && cd parts
          # هر تکه حداکثر 9 مگابایت (کمی پایین‌تر از 10MB برای اطمینان)
          split -b 9M ../archive.zip part_
          a=1
          for f in part_*; do
            mv "$f" $(printf "part_%03d.zip" $a)
            a=$((a + 1))
          done
          total=$(ls part_*.zip | wc -l)
          count=1
          for part in part_*.zip; do
            success=0
            for attempt in 1 2 3 4 5; do
              RESP=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${{ inputs.target_chat_id }}" \
                -F "document=@$part" \
                -F "caption=🎬 پارت $count از $total (کیفیت ${{ inputs.quality }})")
              if echo "$RESP" | grep -q '"ok":true'; then
                success=1; break
              fi
              sleep 4
            done
            if [ $success -eq 0 ]; then
              curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=⚠️ خطا در ارسال پارت $count"
            fi
            count=$((count + 1))
            sleep 2
          done

          # پیام راهنمای ترکیب (ویندوز)
          MERGE_CMD="copy /b parts\\part_*.zip archive_full.zip"
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=$(echo "برای بازسازی فایل، تمام پارت‌ها را در یک پوشه قرار دهید و از دستور زیر در CMD استفاده کنید:\n$MERGE_CMD" | jq -sRr @uri)"

          # پیام راهنما برای لینوکس/مک (اختیاری)
          LINUX_CMD="cat part_* > archive_full.zip"
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=$(echo "در لینوکس/مک:\n$LINUX_CMD" | jq -sRr @uri)"

      # ------------------- گزارش نهایی -------------------
      - name: Final report
        if: always()
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          if [ "${{ job.status }}" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=✅ عملیات دانلود و ارسال با موفقیت کامل شد."
          else
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${{ inputs.target_chat_id }}&text=❌ خطایی در عملیات رخ داد."
          fi
