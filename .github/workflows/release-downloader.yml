name: 🚀 Release Downloader & Sender to Bale

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'نام مخزن (owner/repo)'
        required: true
      asset_name:
        description: 'نام فایل (مثلاً stockfish-windows-x86-64-modern.zip یا *)'
        required: true
        default: '*'
      tag:
        description: 'تگ نسخه (برای آخرین نسخه خالی بگذارید)'
        required: false
        default: ''
      target_chat_id:
        description: 'شناسه کاربر دریافت‌کننده فایل'
        required: true

jobs:
  release-to-bale:
    runs-on: ubuntu-latest
    steps:
      - name: 📢 اطلاع شروع
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "📥 شروع دانلود ${{ inputs.asset_name }} از ${{ inputs.repo }}" | jq -sRr @uri)"

      - name: ⬇️ دانلود از ریلیز
        uses: robinraju/release-downloader@v1.13
        with:
          repository: ${{ inputs.repo }}
          fileName: ${{ inputs.asset_name }}
          tag: ${{ inputs.tag }}
          latest: ${{ inputs.tag == '' }}   # اگر tag خالی بود، آخرین نسخه را بگیر
          out-file-path: './files'

      - name: 📋 گزارش پایان دانلود
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          if [ -d files ] && [ "$(ls -A files)" ]; then
            FILE_LIST=$(ls files/ | tr '\n' ' ')
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "✅ دانلود کامل شد. فایل‌ها: ${FILE_LIST}" | jq -sRr @uri)"
          else
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "❌ هیچ فایلی دانلود نشد!" | jq -sRr @uri)"
            exit 1
          fi

      - name: 🗜️ ساخت فایل ZIP
        run: |
          cd files
          zip -r ../archive.zip ./*
          cd ..
          SIZE=$(stat -c%s archive.zip)
          echo "SIZE=$SIZE" >> $GITHUB_ENV

      - name: 📊 گزارش حجم
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "🗜️ ZIP آماده (حجم: ${SIZE_MB} MB)" | jq -sRr @uri)"

      - name: 📮 ارسال فایل (تکی، ≤10MB)
        if: env.SIZE <= 10485760
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=$(echo "📦 فایل‌های ${{ inputs.repo }}" | jq -sRr @uri)" \
            -F "document=@archive.zip"

      - name: 📦 ارسال پارتیشن‌بندی شده (بیش از 10MB)
        if: env.SIZE > 10485760
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          mkdir parts && cd parts
          split -b 10M ../archive.zip part_
          a=1
          for f in part_*; do
            mv "$f" "part_${a}.zip"
            a=$((a + 1))
          done
          total=$(ls part_*.zip | wc -l)
          count=1
          for part in part_*.zip; do
            echo "ارسال $part ($count از $total)"
            for attempt in 1 2 3; do
              RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=$(echo "📦 ${{ inputs.repo }} - Part $count/$total" | jq -sRr @uri)" \
                -F "document=@$part")
              OK=$(echo "$RESPONSE" | jq -r '.ok')
              if [ "$OK" = "true" ]; then
                echo "✅ $part ارسال شد"
                break
              else
                echo "⚠️ خطا در تلاش $attempt: $RESPONSE"
                sleep 2
              fi
            done
            count=$((count + 1))
            sleep 1
          done

          MERGE_CMD="copy /b $(ls part_*.zip | tr '\n' '+' | sed 's/+$//') full_archive.zip"
          curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "$MERGE_CMD" | jq -sRr @uri)"

      - name: 🏁 گزارش نهایی
        if: always()
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ inputs.target_chat_id }}"
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "✅ عملیات با موفقیت کامل شد." | jq -sRr @uri)"
          else
            curl -s "https://tapi.bale.ai/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=$(echo "❌ خطا در اجرا. وضعیت: ${STATUS}" | jq -sRr @uri)"
          fi
