name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # ---------- کش yt-dlp و xray ----------
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/yt-dlp
            ~/tools/xray
          key: tools-${{ runner.os }}-v2

      - name: Get yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Get Xray core
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      # ---------- اجرای پروکسی (دقیقاً مثل قبل) ----------
      - name: Setup Xray and proxy
        run: |
          echo '${{ secrets.XRAY_CONFIG }}' > config.json
          ~/tools/xray/xray run -config config.json &
          sleep 2
          curl -s --socks5 127.0.0.1:10808 https://www.youtube.com/ | head -c 100
          echo "پروکسی فعال است."

      # ---------- نصب ffmpeg (فقط بار اول کش می‌شود یا سریع نصب می‌شود) ----------
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tools/ffmpeg
          key: ffmpeg-${{ runner.os }}-v1

      - name: Download ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz
          mv ffmpeg-*-amd64-static/ffmpeg ffmpeg-*-amd64-static/ffprobe ~/tools/
          chmod +x ~/tools/ffmpeg ~/tools/ffprobe

      - name: Add ffmpeg to PATH
        run: echo "$HOME/tools" >> $GITHUB_PATH

      # ---------- دانلود ویدیو ----------
      - name: Download video
        run: |
          ~/tools/yt-dlp \
            --proxy socks5://127.0.0.1:10808 \
            -o "video.%(ext)s" \
            "${{ github.event.inputs.url }}"
          VIDEO_FILE=$(ls video.* 2>/dev/null | head -n 1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "❌ دانلود شکست خورد"
            exit 1
          fi
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
          echo "SIZE=$(stat -c%s "$VIDEO_FILE")" >> $GITHUB_ENV

      # ---------- تبدیل کل ویدیو به MP4 سازگار ----------
      - name: Convert video to standard MP4
        run: |
          CONVERTED="converted.mp4"
          ffmpeg -i "$VIDEO_FILE" \
            -c:v libx264 -crf 28 -preset fast \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            "$CONVERTED"
          CONV_SIZE=$(stat -c%s "$CONVERTED")
          echo "CONVERTED_FILE=$CONVERTED" >> $GITHUB_ENV
          echo "CONV_SIZE=$CONV_SIZE" >> $GITHUB_ENV

      # ---------- تقسیم با split (سریع و بدون افت) ----------
      - name: Split video into 9MB parts
        if: env.CONV_SIZE > 9437184   # بیشتر از ۹MB
        run: |
          mkdir -p parts
          split -b 9437184 "$CONVERTED_FILE" parts/part_
          # تغییر نام به part_001.mp4 با حفظ ترتیب
          a=1
          for f in parts/part_*; do
            mv "$f" parts/$(printf "part_%03d.mp4" $a)
            a=$((a + 1))
          done
          echo "total_parts=$(ls parts/part_*.mp4 | wc -l)" >> $GITHUB_ENV

      # ---------- ارسال ----------
      - name: Send to Bale
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.BALE_CHAT_ID }}"
          if [ "$CONV_SIZE" -le 9437184 ]; then
            curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}" \
              -F "document=@$CONVERTED_FILE" \
              -F "caption=🎬 ${{ github.event.inputs.url }}"
          else
            cd parts
            total=$total_parts
            count=1
            for part in part_*.mp4; do
              for attempt in 1 2 3; do
                RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}" \
                  -F "document=@$part" \
                  -F "caption=🎬 ${{ github.event.inputs.url }} - Part $count/$total")
                if echo "$RESPONSE" | grep -q '"ok":true'; then
                  echo "✅ $part ارسال شد"
                  break
                else
                  echo "⚠️ تلاش $attempt: $RESPONSE"
                  sleep 2
                fi
              done
              count=$((count + 1))
              sleep 1
            done
          fi
