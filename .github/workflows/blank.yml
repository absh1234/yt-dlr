name: 🎬 YouTube Downloader to Bale

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # ---------- کش yt-dlp و xray ----------
      - name: Cache tools
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/yt-dlp
            ~/tools/xray
          key: tools-${{ runner.os }}-v2

      - name: Get yt-dlp
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/tools/yt-dlp
          chmod +x ~/tools/yt-dlp

      - name: Get Xray core
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/tools
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip -d ~/tools/xray
          chmod +x ~/tools/xray/xray

      # ---------- اجرای پروکسی (دقیقاً مثل قبل) ----------
      - name: Setup Xray and proxy
        run: |
          echo '${{ secrets.XRAY_CONFIG }}' > config.json
          ~/tools/xray/xray run -config config.json &
          sleep 2
          curl -s --socks5 127.0.0.1:10808 https://www.youtube.com/ | head -c 100
          echo "پروکسی فعال است."

      # ---------- نصب ffmpeg (فقط بار اول کش می‌شود یا سریع نصب می‌شود) ----------
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ---------- دانلود ویدیو ----------
      - name: Download video
        run: |
          ~/tools/yt-dlp \
            --proxy socks5://127.0.0.1:10808 \
            -o "video.%(ext)s" \
            "${{ github.event.inputs.url }}"
          VIDEO_FILE=$(ls video.* 2>/dev/null | head -n 1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "❌ دانلود شکست خورد"
            exit 1
          fi
          echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
          echo "SIZE=$(stat -c%s "$VIDEO_FILE")" >> $GITHUB_ENV

      # ---------- پارتیشن‌بندی با ffmpeg (پارت‌های مستقل) ----------
      - name: Split video with ffmpeg
        run: |
          if [ "$SIZE" -le 10485760 ]; then
            echo "فایل کوچکتر از ۱۰MB است، نیازی به تقسیم نیست."
            exit 0
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE")
          DURATION=${DURATION%.*}
          PART_TIME=$((DURATION / 5 + 1))  # تقریباً ۵ پارت (قابل تنظیم)
          mkdir -p parts
          ffmpeg -i "$VIDEO_FILE" -c copy -map 0 -segment_time $PART_TIME -f segment -reset_timestamps 1 parts/part_%03d.mp4
          echo "total_parts=$(ls parts/part_*.mp4 | wc -l)" >> $GITHUB_ENV

      # ---------- ارسال پارت‌ها ----------
      - name: Send to Bale
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.BALE_CHAT_ID }}"
          if [ "$SIZE" -le 10485760 ]; then
            curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=$(echo "🎬 ${{ github.event.inputs.url }}" | jq -sRr @uri)" \
              -F "document=@$VIDEO_FILE"
          else
            cd parts
            total=$total_parts
            count=1
            for part in part_*.mp4; do
              for attempt in 1 2 3; do
                RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=$(echo "🎬 ${{ github.event.inputs.url }} - Part $count/$total" | jq -sRr @uri)" \
                  -F "document=@$part")
                if [ "$(echo "$RESPONSE" | jq -r '.ok')" = "true" ]; then
                  break
                fi
                sleep 2
              done
              count=$((count + 1))
              sleep 1
            done
          fi
