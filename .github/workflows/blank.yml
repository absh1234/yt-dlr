name: Test YouTube with Cookies
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: sudo apt-get update && sudo apt-get install -y yt-dlp
      - name: Download with cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          yt-dlp --cookies cookies.txt -o "test.%(ext)s" "https://www.youtube.com/watch?v=NROCQCmA8ko"
          ls -lah test.*
