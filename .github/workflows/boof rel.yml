name: Download and Split YouTube Video

on:
  # برای اجرای دستی از طریق Actions tab
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیو یوتیوب'
        required: true
        type: string
      output_name:
        description: 'نام فایل خروجی (بدون پسوند)'
        required: true
        type: string
        default: 'video'

# محدودیت‌های دسترسی
permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download video
        run: |
          mkdir -p output
          yt-dlp -o "output/${{ github.event.inputs.output_name }}.%(ext)s" ${{ github.event.inputs.video_url }}
          # لیست فایل‌های دانلود شده
          ls -l output/

      - name: Split video by size (approximate)
        run: |
          cd output
          # پیدا کردن فایل دانلود شده
          VIDEO_FILE=$(ls | grep -E '\.(mp4|webm|mkv|mp3|m4a)$' | head -n 1)
          
          if [ -z "$VIDEO_FILE" ]; then
            echo "هیچ فایل ویدیویی یا صوتی پیدا نشد."
            exit 1
          fi

          echo "Processing file: $VIDEO_FILE"

          # تبدیل به mp3 برای صدا یا نگه داشتن فرمت اصلی
          # اگر فایل صوتی است (mp3/m4a)، می‌توان مستقیماً برش داد
          # اگر ویدیویی است، ffmpeg آن را به فرمت مناسب تبدیل و برش می‌دهد

          # محاسبه اندازه فایل
          FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || stat -f%z "$VIDEO_FILE")
          MAX_SIZE=$((10 * 1024 * 1024)) # 10 مگابایت

          if [ "$FILE_SIZE" -le "$MAX_SIZE" ]; then
            echo "فایل کوچکتر از 10 مگابایت است. نیاز به برش نیست."
            cp "$VIDEO_FILE" ../split_output/
          else
            mkdir -p ../split_output
            # برش بر اساس زمان با استفاده از ffmpeg
            # نکته: برش دقیق بر اساس حجم بدون خرابی فایل تقریباً غیرممکن است مگر اینکه از کدک‌های خاصی استفاده کنید.
            # اینجا یک روش تقریبی با محاسبه مدت زمان هر قطعه بر اساس بیت‌ریت انجام می‌دهیم.
            
            # دریافت بیت‌ریت تقریبی
            DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO_FILE")
            # فرض می‌کنیم بیت‌ریت متوسط 2 Mbps است (برای ویدیو) یا کمتر برای صدا.
            # این یک تخمین است. برای دقت بیشتر، باید بیت‌ریت دقیق را از ffprobe گرفت.
            
            BITRATE=$(ffprobe -v error -select_streams v:0 -show_entries stream=bit_rate -of csv=p=0 "$VIDEO_FILE" 2>/dev/null || echo "2000000")
            # اگر بیت‌ریت ویدیو پیدا نشد (شاید صدا است)، از بیت‌ریت پیش‌فرض استفاده کن
            if [ -z "$BITRATE" ] || [ "$BITRATE" = "0" ]; then
              BITRATE=$(ffprobe -v error -select_streams a:0 -show_entries stream=bit_rate -of csv=p=0 "$VIDEO_FILE" 2>/dev/null || echo "128000")
            fi
            if [ -z "$BITRATE" ]; then
              BITRATE="128000" # پیش‌فرض 128 کیلوبیت برای صدا
            fi

            # محاسبه مدت زمان هر قطعه به ثانیه
            # زمان = حجم / بیت‌ریت
            DURATION_PER_SEGMENT=$(echo "$MAX_SIZE / $BITRATE" | bc)
            
            # اگر مدت زمان محاسبه شده صفر یا منفی شد، از مقدار پیش‌فرض استفاده کن
            if [ "$DURATION_PER_SEGMENT" -le 0 ]; then
              DURATION_PER_SEGMENT=60 # پیش‌فرض 60 ثانیه
            fi

            echo "Duration per segment: $DURATION_PER_SEGMENT seconds"
            echo "Total duration: $DURATION"

            # برش ویدیو/صدا با ffmpeg
            # -t مدت زمان هر قطعه
            # -c copy کپی بدون انکود مجدد (سریع‌تر، اما ممکن است مرزها دقیق نباشند)
            # -c:a/libx264 یا -c:v copy بسته به فرمت

            ffmpeg -i "$VIDEO_FILE" -f segment -segment_time $DURATION_PER_SEGMENT -c copy -reset_timestamps 1 "../split_output/part_%03d.mp4" 2>/dev/null
            
            # اگر فایل صوتی است، پسوند را به mp3 تغییر بده
            # این مرحله اختیاری است
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: split-files
          path: split_output/

      - name: Create Release (Optional)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: split_output/*
          tag_name: v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
