name: Keep Alive
on:
  schedule:
    - cron: '0 0 * * *'   # هر روز یک بار
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dummy commit
        run: |
          git config user.email "keepalive@github.com"
          git config user.name "Keep Alive Bot"
          git commit --allow-empty -m "Keep alive"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
