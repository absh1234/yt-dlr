name: 🤖 Bale Interactive Bot (Self-Healing)

on:
  schedule:
    - cron: '* * * * *'   # هر ۱ دقیقه
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: نصب وابستگی‌ها
        run: pip3 install --user requests || echo "نصب requests شکست خورد"

      - name: دریافت آپدیت‌ها
        id: fetch
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          OFFSET_FILE=".bale_offset"
          offset=0
          [ -f "$OFFSET_FILE" ] && offset=$(cat "$OFFSET_FILE")
          RESPONSE=$(curl -s "https://tapi.bale.ai/bot${TOKEN}/getUpdates?offset=$((offset+1))&timeout=5")
          echo "$RESPONSE" > updates.json
          jq -r '.result[-1].update_id // empty' updates.json > "$OFFSET_FILE"
        continue-on-error: true

      - name: پردازش پیام‌ها (با مدیریت خطا)
        id: process
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # اطمینان از وجود فایل state
          [ ! -f bale_state.json ] && echo '{}' > bale_state.json
          # اگر پیامی نیست، بی‌صدا خارج شو
          if [ ! -f updates.json ] || [ "$(jq '.result | length' updates.json)" = "0" ]; then
            exit 0
          fi
          # اجرای پردازش و ثبت خطا در فایل
          python3 process_updates.py 2> error.log || true
          if [ -s error.log ]; then
            # خطاها را برای کاربر بفرست
            curl -s "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.BALE_CHAT_ID }}&text=$(echo "⚠️ خطایی رخ داد: $(cat error.log)" | head -c 500)"
          fi
        continue-on-error: true

      - name: ذخیره وضعیت (بدون توقف)
        run: |
          git config user.email "actions@github.com"
          git config user.name "Actions Bot"
          git add bale_state.json .bale_offset 2>/dev/null
          if ! git diff --staged --quiet; then
            git commit -m "ربات: بروزرسانی وضعیت [skip ci]" || true
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main || true
          fi
        continue-on-error: true
