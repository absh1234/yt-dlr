name: 🤖 Bale Bot (Persistent)

on:
  schedule:
    - cron: '* * * * *'       # هر ۱ دقیقه
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    # اگر هم خطایی رخ داد، job قرمز نشود (برای پایداری)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: نصب requests
        run: pip3 install --user requests || true

      - name: دریافت آپدیت‌های جدید
        run: |
          TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          OFFSET_FILE=".bale_offset"
          offset=0
          [ -f "$OFFSET_FILE" ] && offset=$(cat "$OFFSET_FILE")
          # دریافت تا ۱۰ آپدیت جدید
          RESPONSE=$(curl -s "https://tapi.bale.ai/bot${TOKEN}/getUpdates?offset=$((offset+1))&limit=10&timeout=5" || true)
          echo "$RESPONSE" > updates.json
          # ذخیره آخرین update_id دریافتی (مهم)
          jq -r '.result[-1].update_id // empty' updates.json > "$OFFSET_FILE"
        continue-on-error: true

      - name: پردازش پیام‌ها و callbackها
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          [ ! -f bale_state.json ] && echo '{}' > bale_state.json
          if [ ! -f updates.json ] || [ "$(jq '.result | length' updates.json 2>/dev/null || echo 0)" = "0" ]; then
            exit 0
          fi
          python3 process_updates.py \
            --token "${{ secrets.BALE_BOT_TOKEN }}" \
            --gh_pat "${{ secrets.GH_PAT }}" \
            --repo "${{ github.repository }}" \
            --guardnet_key "${{ secrets.GUARDNET_API_KEY }}" \
            --chat_id "${{ secrets.BALE_CHAT_ID }}" \
            2> error.log || true
          if [ -s error.log ]; then
            curl -s "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.BALE_CHAT_ID }}&text=$(echo "⚠️ خطا: $(head -c 300 error.log)" | jq -sRr @uri)" || true
          fi
        continue-on-error: true

      - name: ذخیره وضعیت در مخزن (تضمین‌شده)
        run: |
          git config user.email "actions@github.com" || true
          git config user.name "Actions Bot" || true
          git add bale_state.json .bale_offset
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "ربات: بروزرسانی offset و state"
          git pull --rebase https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git main
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
